<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — Alberto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --ink: #1a1613;
    --muted: #6b6258;
    --accent: #b8411f;
    --line: #e6e0d4;
    --user-bg: #1a1613;
    --user-ink: #faf8f3;
    --assist-bg: #f1ece0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 16px;
    line-height: 1.6;
  }

  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .brand {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .brand em {
    color: var(--accent);
    font-style: italic;
  }

  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .welcome {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .welcome h1 {
    font-size: 2.5rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 1rem;
    letter-spacing: -0.03em;
  }

  .welcome h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .welcome p {
    font-size: 1rem;
    max-width: 420px;
    margin: 0 auto;
  }

  .msg {
    padding: 1rem 1.25rem;
    border-radius: 4px;
    max-width: 85%;
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    background: var(--user-bg);
    color: var(--user-ink);
    align-self: flex-end;
    border-bottom-right-radius: 0;
  }

  .msg.assistant {
    background: var(--assist-bg);
    color: var(--ink);
    align-self: flex-start;
    border-bottom-left-radius: 0;
  }

  .msg.error {
    background: #fdf0ed;
    color: var(--accent);
    border: 1px solid #f4c8bd;
    align-self: center;
    max-width: 90%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }

  .msg-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.6;
    margin-bottom: 0.5rem;
    display: block;
  }

  .msg-content {
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .thinking {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: pulse 1.4s infinite ease-in-out;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.2); }
  }

  #image-preview {
    display: none;
    margin-top: 1rem;
    padding: 0.6rem 0.75rem;
    background: var(--assist-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    gap: 0.75rem;
    align-items: center;
  }

  #image-preview.visible {
    display: flex;
  }

  #image-preview img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 3px;
    flex-shrink: 0;
  }

  #image-preview .info {
    flex: 1;
    min-width: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.4;
    overflow: hidden;
  }

  #image-preview .info .name {
    color: var(--ink);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #image-preview .remove {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 0.35rem 0.7rem;
    height: auto;
    font-size: 0.7rem;
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #image-preview .remove:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: none;
  }

  .msg-image {
    display: block;
    max-width: 100%;
    max-height: 300px;
    border-radius: 4px;
    margin-bottom: 0.5rem;
  }

  form {
    border-top: 1px solid var(--line);
    padding: 1.25rem 0 0;
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    border: 1px solid var(--line);
    background: white;
    padding: 0.9rem 1rem;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1rem;
    resize: none;
    border-radius: 4px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    min-height: 52px;
    max-height: 200px;
    line-height: 1.5;
  }

  textarea:focus {
    border-color: var(--ink);
  }

  button {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 0 1.5rem;
    height: 52px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }

  button:hover:not(:disabled) {
    background: var(--accent);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  footer {
    padding: 1rem 2rem;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 640px) {
    header { padding: 1rem 1.25rem; }
    main { padding: 1rem 1.25rem; }
    .welcome h1 { font-size: 1.8rem; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">chat <em>/</em> alberto</div>
  <div class="status" id="status">pronto</div>
</header>

<main>
  <div id="messages">
    <div class="welcome">
      <h1>dimmi <em>qualcosa</em></h1>
      <p>Interfaccia diretta all'API di Claude. Scrivi sotto e premi invio, oppure incolla un'immagine con cmd+v.</p>
    </div>
  </div>

  <div id="image-preview">
    <img id="preview-thumb" alt="anteprima">
    <div class="info">
      <div class="name" id="preview-name"></div>
      <div><span id="preview-size"></span> · <span id="preview-type"></span></div>
    </div>
    <button type="button" class="remove" id="preview-remove">rimuovi</button>
  </div>

  <form id="chat-form">
    <textarea id="input" placeholder="scrivi qui... (cmd+v per incollare un'immagine)" rows="1" autofocus></textarea>
    <button type="submit" id="send">invia</button>
  </form>
</main>

<footer>invio = manda · shift+invio = a capo · cmd+v = incolla immagine</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const statusEl = document.getElementById('status');
  const welcomeEl = document.querySelector('.welcome');
  const previewEl = document.getElementById('image-preview');
  const previewThumb = document.getElementById('preview-thumb');
  const previewName = document.getElementById('preview-name');
  const previewSize = document.getElementById('preview-size');
  const previewType = document.getElementById('preview-type');
  const previewRemove = document.getElementById('preview-remove');

  let currentImage = null;

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  function clearImage() {
    currentImage = null;
    previewEl.classList.remove('visible');
    previewThumb.src = '';
    previewName.textContent = '';
    previewSize.textContent = '';
    previewType.textContent = '';
  }

  function showImage(file, dataUrl) {
    const base64 = dataUrl.split(',')[1];
    currentImage = { data: base64, mediaType: file.type, dataUrl };
    previewThumb.src = dataUrl;
    previewName.textContent = file.name || 'immagine.png';
    previewSize.textContent = formatSize(file.size);
    previewType.textContent = file.type;
    previewEl.classList.add('visible');
  }

  previewRemove.addEventListener('click', clearImage);

  document.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (!file) continue;
        e.preventDefault();
        const reader = new FileReader();
        reader.onload = () => showImage(file, reader.result);
        reader.readAsDataURL(file);
        return;
      }
    }
  });

  // Auto-resize della textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  });

  // Invio con Enter (shift+enter = nuova riga)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function addMessage(role, content, imageDataUrl) {
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const label = document.createElement('span');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'tu' : role === 'assistant' ? 'claude' : 'errore';

    div.appendChild(label);

    if (imageDataUrl) {
      const img = document.createElement('img');
      img.className = 'msg-image';
      img.src = imageDataUrl;
      img.alt = 'immagine allegata';
      div.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'msg-content';
    body.textContent = content;

    div.appendChild(body);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return body;
  }

  function addThinking() {
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'thinking-msg';

    const label = document.createElement('span');
    label.className = 'msg-label';
    label.textContent = 'claude';

    const thinking = document.createElement('div');
    thinking.className = 'thinking';
    thinking.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(label);
    div.appendChild(thinking);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-msg');
    if (el) el.remove();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const userText = input.value.trim();
    if (!userText && !currentImage) return;

    const imageToSend = currentImage;
    addMessage('user', userText, imageToSend ? imageToSend.dataUrl : null);
    input.value = '';
    input.style.height = 'auto';
    clearImage();
    sendBtn.disabled = true;
    statusEl.textContent = 'in elaborazione...';
    addThinking();

    try {
      // Chiama il backend su Railway (stesso dominio), NON direttamente Anthropic
      const payload = { message: userText };
      if (imageToSend) {
        payload.image = { data: imageToSend.data, mediaType: imageToSend.mediaType };
      }
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      removeThinking();

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }

      addMessage('assistant', data.reply);
      statusEl.textContent = 'pronto';

    } catch (error) {
      removeThinking();
      addMessage('error', `Errore: ${error.message}`);
      statusEl.textContent = 'errore';
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
